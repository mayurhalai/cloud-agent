apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: opencode-sandbox-template
spec:
  podTemplate:
    spec:
      containers:
        - name: opencode-agent
          image: agent-opencode:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
          readinessProbe:
            httpGet:
              path: "/"
              port: 8888
            initialDelaySeconds: 0
            periodSeconds: 1
          livenessProbe:
            httpGet:
              path: "/"
              port: 8888
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
          restartPolicy: "Never"
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cloud-agent-secret
                  key: GEMINI_API_KEY
