apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: pi-sandbox-template
spec:
  podTemplate:
    spec:
      containers:
        - name: pi-agent
          image: agent-pi:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
          readinessProbe:
            httpGet:
              path: "/health"
              port: 8888
            initialDelaySeconds: 0
            periodSeconds: 1
          livenessProbe:
            httpGet:
              path: "/health"
              port: 8888
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cloud-agent-secret
                  key: GEMINI_API_KEY
          volumeMounts:
            - name: models-config
              mountPath: /etc/cloud-agent/models
      restartPolicy: "Never"
      volumes:
        - name: models-config
          configMap:
            name: cloud-agent-models-config
            optional: true
