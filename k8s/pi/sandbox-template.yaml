apiVersion: extensions.agents.x-k8s.io/v1beta1
kind: SandboxTemplate
metadata:
  name: pi-sandbox-template
spec:
  podTemplate:
    containers:
      - name: pi-agent
        image: agent-pi:latest
        ports:
          - containerPort: 8888
            readinessProbe:
              httpGet:
                path: "/"
                port: 8888
              initialDelaySeconds: 0
              periodSeconds: 1
            livenessProbe:
              httpGet:
                path: "/"
                port: 8888
              initialDelaySeconds: 2
              periodSeconds: 10
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
            ephemeral-storage: "512Mi"
        restartPolicy: "Never"
