apiVersion: v1
kind: ServiceAccount
metadata:
  name: webhook-listener
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: webhook-listener-role
rules:
  - apiGroups: ["cloudagent.mayurhalai.github.com"]
    resources: ["agenttasks", "agenttasks/status"]
    verbs: ["create", "get", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: webhook-listener-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: webhook-listener-role
subjects:
  - kind: ServiceAccount
    name: webhook-listener
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-orchestrator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sandbox-orchestrator-role
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["cloudagent.mayurhalai.github.com"]
    resources: ["agenttasks", "agenttasks/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["sandboxes", "sandboxes/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["extensions.agents.x-k8s.io"]
    resources:
      [
        "sandboxclaims",
        "sandboxclaims/status",
        "sandboxtemplates",
        "sandboxtemplates/status",
        "sandboxwarmpools",
        "sandboxwarmpools/status",
      ]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sandbox-orchestrator-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sandbox-orchestrator-role
subjects:
  - kind: ServiceAccount
    name: sandbox-orchestrator
